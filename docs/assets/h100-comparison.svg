<svg width="1400" height="1040" viewBox="0 0 1400 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="60" x2="1340" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0D"/>
      <stop offset="1" stop-color="#14171C"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#151920"/>
      <stop offset="1" stop-color="#0F1319"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { fill: #F5F7FA; font: 700 34px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #AAB4C0; font: 500 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .section { fill: #F5F7FA; font: 700 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #D6DCE5; font: 500 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #93A0AF; font: 500 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #F5F7FA; font: 600 14px ui-monospace, "SFMono-Regular", SFMono, Menlo, Consolas, monospace; }
      .metric { fill: #F5F7FA; font: 700 18px ui-monospace, "SFMono-Regular", SFMono, Menlo, Consolas, monospace; }
      .axis { fill: #7F8A97; font: 600 12px ui-monospace, "SFMono-Regular", SFMono, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect x="24" y="24" width="1352" height="992" rx="30" fill="url(#bg)"/>
  <rect x="24.5" y="24.5" width="1351" height="991" rx="29.5" stroke="#232A33"/>

  <text x="72" y="92" class="title">rvLLM H100 Comparison</text>
  <text x="72" y="120" class="subtitle">Qwen2.5-7B f16, H100 SXM 80GB. Direct engine uses 256 output tokens. HTTP uses 200 requests at concurrency 32 with max_tokens=256.</text>

  <rect x="72" y="154" width="18" height="18" rx="5" fill="#9FDBFF"/>
  <text x="102" y="168" class="body">stock vLLM 0.6.3.post1</text>
  <rect x="312" y="154" width="18" height="18" rx="5" fill="#F7C6DA"/>
  <text x="342" y="168" class="body">rvllm-lite</text>
  <rect x="466" y="154" width="18" height="18" rx="5" fill="#B8F3D1"/>
  <text x="496" y="168" class="body">rvLLM</text>

  <rect x="72" y="214" width="610" height="572" rx="26" fill="url(#panel)" stroke="#232A33" filter="url(#shadow)"/>
  <text x="104" y="262" class="section">Direct Engine Throughput</text>
  <text x="104" y="286" class="small">Closer to raw kernel/runtime behavior</text>

  <text x="176" y="334" class="axis">0</text>
  <text x="480" y="334" class="axis">1600</text>
  <text x="744" y="334" class="axis">3200 tok/s</text>
  <line x1="176" y1="320" x2="176" y2="732" stroke="#27303A" stroke-width="1"/>
  <line x1="489" y1="320" x2="489" y2="732" stroke="#202831" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="801" y1="320" x2="801" y2="732" stroke="#27303A" stroke-width="1"/>

  <text x="104" y="372" class="mono">N=1</text>
  <rect x="176" y="351" width="26" height="16" rx="8" fill="#9FDBFF"/>
  <text x="214" y="364" class="axis">133.7</text>
  <rect x="176" y="372" width="26" height="16" rx="8" fill="#F7C6DA"/>
  <text x="214" y="385" class="axis">133.9</text>
  <rect x="176" y="393" width="24" height="16" rx="8" fill="#B8F3D1"/>
  <text x="212" y="406" class="axis">120.6</text>

  <text x="104" y="448" class="mono">N=4</text>
  <rect x="176" y="427" width="106" height="16" rx="8" fill="#9FDBFF"/>
  <text x="294" y="440" class="axis">543.3</text>
  <rect x="176" y="448" width="106" height="16" rx="8" fill="#F7C6DA"/>
  <text x="294" y="461" class="axis">542.8</text>
  <rect x="176" y="469" width="84" height="16" rx="8" fill="#B8F3D1"/>
  <text x="272" y="482" class="axis">427.9</text>

  <text x="104" y="524" class="mono">N=8</text>
  <rect x="176" y="503" width="181" height="16" rx="8" fill="#9FDBFF"/>
  <text x="369" y="516" class="axis">926.1</text>
  <rect x="176" y="524" width="181" height="16" rx="8" fill="#F7C6DA"/>
  <text x="369" y="537" class="axis">925.4</text>
  <rect x="176" y="545" width="165" height="16" rx="8" fill="#B8F3D1"/>
  <text x="353" y="558" class="axis">845.8</text>

  <text x="104" y="600" class="mono">N=16</text>
  <rect x="176" y="579" width="378" height="16" rx="8" fill="#9FDBFF"/>
  <text x="566" y="592" class="axis">1934.5</text>
  <rect x="176" y="600" width="325" height="16" rx="8" fill="#F7C6DA"/>
  <text x="513" y="613" class="axis">1664.8</text>
  <rect x="176" y="621" width="322" height="16" rx="8" fill="#B8F3D1"/>
  <text x="510" y="634" class="axis">1648.9</text>

  <text x="104" y="676" class="mono">N=32</text>
  <rect x="176" y="655" width="625" height="16" rx="8" fill="#9FDBFF"/>
  <text x="687" y="668" class="axis">3197.1</text>
  <rect x="176" y="676" width="585" height="16" rx="8" fill="#F7C6DA"/>
  <text x="646" y="689" class="axis">2994.5</text>
  <rect x="176" y="697" width="620" height="16" rx="8" fill="#B8F3D1"/>
  <text x="681" y="710" class="axis">3170.0</text>

  <rect x="104" y="740" width="546" height="1" fill="#232A33"/>
  <text x="104" y="770" class="body">Takeaway: stock vLLM still leads direct engine overall, but rvLLM closes to near parity at N=32.</text>

  <rect x="718" y="214" width="610" height="572" rx="26" fill="url(#panel)" stroke="#232A33" filter="url(#shadow)"/>
  <text x="750" y="262" class="section">HTTP Serving Throughput</text>
  <text x="750" y="286" class="small">Practical serving-stack behavior</text>

  <text x="930" y="334" class="axis">0</text>
  <text x="1222" y="334" class="axis">1400</text>
  <text x="1363" y="334" text-anchor="end" class="axis">2862 tok/s</text>
  <line x1="930" y1="320" x2="930" y2="662" stroke="#27303A" stroke-width="1"/>
  <line x1="1242" y1="320" x2="1242" y2="662" stroke="#202831" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="1360" y1="320" x2="1360" y2="662" stroke="#27303A" stroke-width="1"/>

  <text x="750" y="380" class="mono">stock vLLM</text>
  <rect x="930" y="360" width="625" height="22" rx="11" fill="#9FDBFF"/>
  <text x="1567" y="376" class="axis">2861.9 tok/s</text>
  <text x="930" y="408" class="small">single request 41.0 tok/s</text>
  <text x="1110" y="408" class="small">avg latency 2061.9 ms</text>
  <text x="1288" y="408" class="small">idle VRAM 71.9 GiB</text>

  <text x="750" y="490" class="mono">rvllm-lite</text>
  <rect x="930" y="470" width="29" height="22" rx="11" fill="#F7C6DA"/>
  <text x="971" y="486" class="axis">131.8 tok/s</text>
  <text x="930" y="518" class="small">single request 128.6 tok/s</text>
  <text x="1120" y="518" class="small">avg latency 43334.9 ms</text>
  <text x="1312" y="518" class="small">idle VRAM 71.9 GiB</text>

  <text x="750" y="600" class="mono">rvLLM</text>
  <rect x="930" y="580" width="595" height="22" rx="11" fill="#B8F3D1"/>
  <text x="1537" y="596" class="axis">2723.2 tok/s</text>
  <text x="930" y="628" class="small">single request 120.2 tok/s</text>
  <text x="1120" y="628" class="small">avg latency 2685.2 ms</text>
  <text x="1298" y="628" class="small">idle VRAM 75.2 GiB</text>

  <rect x="750" y="680" width="546" height="78" rx="16" fill="#10161D" stroke="#232A33"/>
  <text x="774" y="712" class="body">Key split:</text>
  <text x="850" y="712" class="small">rvllm-lite stays close on direct engine, then falls apart once the serving layer is involved.</text>
  <text x="774" y="740" class="small">rvLLM is already in the same practical HTTP class as stock vLLM, but still trails on raw direct-engine throughput at low and mid N.</text>

  <rect x="72" y="818" width="1256" height="156" rx="26" fill="url(#panel)" stroke="#232A33" filter="url(#shadow)"/>
  <text x="104" y="864" class="section">What This Says About The Stack</text>
  <text x="104" y="894" class="body">The cleanest current win is not a headline speedup claim. It is that the Rust serving path is already competitive, the memory model is more controllable, and the architecture makes kernel work visible instead of burying it under Python scheduling noise.</text>

  <rect x="104" y="918" width="366" height="28" rx="14" fill="#121B22" stroke="#9FDBFF"/>
  <text x="122" y="937" class="metric">rvLLM HTTP: 0.95x stock vLLM</text>

  <rect x="486" y="918" width="320" height="28" rx="14" fill="#1A1419" stroke="#F7C6DA"/>
  <text x="504" y="937" class="metric">rvllm-lite HTTP bottleneck: 21.7x lower</text>

  <rect x="822" y="918" width="400" height="28" rx="14" fill="#0F1C18" stroke="#B8F3D1"/>
  <text x="840" y="937" class="metric">rvLLM direct @ N=32: 0.99x stock vLLM</text>
</svg>
